<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#E50000"/>
  <!-- Film clapperboard body -->
  <rect x="12" y="26" width="40" height="26" rx="3" ry="3" fill="#ffffff"/>
  <!-- Clapperboard top bar -->
  <rect x="12" y="18" width="40" height="10" rx="3" ry="3" fill="#141414"/>
  <!-- Clapper stripes -->
  <line x1="20" y1="18" x2="16" y2="28" stroke="#E50000" stroke-width="3" stroke-linecap="round"/>
  <line x1="28" y1="18" x2="24" y2="28" stroke="#E50000" stroke-width="3" stroke-linecap="round"/>
  <line x1="36" y1="18" x2="32" y2="28" stroke="#E50000" stroke-width="3" stroke-linecap="round"/>
  <line x1="44" y1="18" x2="40" y2="28" stroke="#E50000" stroke-width="3" stroke-linecap="round"/>
  <!-- Play button triangle -->
  <polygon points="26,33 26,46 42,39.5" fill="#E50000"/>
</svg>
